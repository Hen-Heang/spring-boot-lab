spring.application.name=spring-boot-actuator-prometheus
server.port=8080

# Expose all actuator endpoints (restrict in production!)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Add app info to /actuator/info
management.info.env.enabled=true
info.app.name=Spring Boot Actuator + Prometheus
info.app.version=1.0.0
info.app.description=Demonstrates Actuator, custom metrics, and Prometheus scraping

# Tag all metrics with app name (useful in Grafana dashboards)
management.metrics.tags.application=${spring.application.name}

# -------------------------------------------------------
# To run Prometheus + Grafana locally with Docker:
#
# docker run -d -p 9090:9090 \
#   -v ./prometheus.yml:/etc/prometheus/prometheus.yml \
#   prom/prometheus
#
# prometheus.yml scrape config:
#   scrape_configs:
#     - job_name: 'spring-boot'
#       metrics_path: '/actuator/prometheus'
#       static_configs:
#         - targets: ['host.docker.internal:8080']
#
# docker run -d -p 3000:3000 grafana/grafana
# Then import dashboard ID 4701 (JVM Micrometer) from grafana.com
# -------------------------------------------------------
