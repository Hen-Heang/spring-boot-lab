spring.main.banner-mode=off
server.port=8081
spring.application.name=course-service
# Datasource
spring.datasource.url=jdbc:h2:mem:h2dbTest
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true


# Take the span id and trace id from the Mapped Diagnostic Context (MDC) and
# put them into the log message.
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

logging.pattern.level=%5p [${spring.application.name},%X{traceId},%X{spanId}]

# Micrometer Tracing - sample 100% of requests (use 0.1 for 10% in production)
management.tracing.sampling.probability=1.0

# Zipkin endpoint (Micrometer Tracing replaces spring.zipkin.base-url from Sleuth)
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans