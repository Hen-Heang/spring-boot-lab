spring.application.name=spring-ai-getting-started
server.port=8080

# OpenAI API Key — set via environment variable: OPENAI_API_KEY=sk-...
# Never hardcode your API key here!
spring.ai.openai.api-key=${OPENAI_API_KEY}

# Model selection (gpt-4o-mini is fast and cheap for learning)
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7

# -------------------------------------------------------
# To switch to Anthropic (Claude), replace the dependency
# in pom.xml and use:
#   spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
#   spring.ai.anthropic.chat.options.model=claude-3-5-haiku-20241022
#
# To use Ollama (local, free):
#   spring.ai.ollama.base-url=http://localhost:11434
#   spring.ai.ollama.chat.options.model=llama3.2
# -------------------------------------------------------
